<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบแจ้งซ่อม | Maintenance Reporting System</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔧</text></svg>">

  <style>
    /* =========================================
       Base & Reset
       ========================================= */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Sarabun', sans-serif;
    }
    body {
      background-color: #f3f4f6;
      color: #333;
      line-height: 1.6;
    }
    .hidden {
      display: none !important;
    }

    /* =========================================
       Loading Screen
       ========================================= */
    #loader {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100vh;
      background-color: #f3f4f6;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    .loader-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      animation: bounce 2s infinite;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e5e7eb;
      border-top: 4px solid #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-20px); } 60% { transform: translateY(-10px); } }

    /* =========================================
       Layout & Cards
       ========================================= */
    .container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      width: 100%;
      max-width: 400px;
      padding: 2rem;
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .card-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .card-header h1 {
      font-size: 1.5rem;
      color: #1f2937;
      margin-top: 0.5rem;
    }
    .card-header p {
      color: #6b7280;
      font-size: 0.875rem;
    }

    /* =========================================
       Forms & Inputs
       ========================================= */
    .form-group {
      margin-bottom: 1.25rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      color: #374151;
      font-size: 0.9rem;
    }
    .form-control {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
      font-size: 1rem;
    }
    .form-control:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
    .btn {
      width: 100%;
      padding: 0.75rem;
      background-color: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .btn:hover {
      background-color: #2563eb;
    }
    .btn-danger {
      background-color: #ef4444;
      margin-top: 1rem;
    }
    .btn-danger:hover {
      background-color: #dc2626;
    }

    /* =========================================
       Dashboard Styles
       ========================================= */
    #app-page .card {
      max-width: 600px;
    }
    .status-badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      background-color: #dbeafe;
      color: #1e40af;
      border-radius: 9999px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>

  <div id="loader">
    <div class="loader-icon">🔧</div>
    <div class="spinner"></div>
    <span style="color: #4b5563; font-weight: 500;">กำลังเริ่มต้นระบบ...</span>
  </div>

  <main id="auth-page" class="container hidden">
    <div class="card">
      <div class="card-header">
        <div style="font-size: 3rem;">🔐</div>
        <h1>เข้าสู่ระบบแจ้งซ่อม</h1>
        <p>กรุณากรอกข้อมูลเพื่อเข้าใช้งานระบบ</p>
      </div>
      <form id="login-form">
        <div class="form-group">
          <label for="username">ชื่อผู้ใช้งาน</label>
          <input type="text" id="username" class="form-control" placeholder="admin" required>
        </div>
        <div class="form-group">
          <label for="password">รหัสผ่าน</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn">เข้าสู่ระบบ</button>
      </form>
    </div>
  </main>

  <main id="app-page" class="container hidden">
    <div class="card">
      <div class="card-header" style="text-align: left; display: flex; justify-content: space-between; align-items: center;">
        <div>
          <span class="status-badge">ผู้ใช้งาน: Admin</span>
          <h1 style="margin: 0;">ฟอร์มแจ้งซ่อมบำรุง 🔧</h1>
        </div>
      </div>
      
      <form id="report-form">
        <div class="form-group">
          <label>หัวข้อปัญหา</label>
          <input type="text" class="form-control" placeholder="เช่น แอร์น้ำหยด, หลอดไฟขาด..." required>
        </div>
        <div class="form-group">
          <label>สถานที่ / ห้อง</label>
          <input type="text" class="form-control" placeholder="เช่น ห้องประชุม 1, ชั้น 3..." required>
        </div>
        <div class="form-group">
          <label>รายละเอียดเพิ่มเติม</label>
          <textarea class="form-control" rows="4" placeholder="อธิบายลักษณะปัญหาที่พบ..." required></textarea>
        </div>
        <button type="submit" class="btn">ส่งเรื่องแจ้งซ่อม</button>
        <button type="button" id="logout-btn" class="btn btn-danger">ออกจากระบบ</button>
      </form>
    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const loader = document.getElementById('loader');
      const authPage = document.getElementById('auth-page');
      const appPage = document.getElementById('app-page');
      
      const loginForm = document.getElementById('login-form');
      const logoutBtn = document.getElementById('logout-btn');
      const reportForm = document.getElementById('report-form');

      // จำลองการโหลดระบบ (ดีเลย์ 1.5 วินาที)
      setTimeout(() => {
        loader.style.opacity = '0';
        setTimeout(() => {
          loader.classList.add('hidden');
          // เมื่อโหลดเสร็จ ให้โชว์หน้า Login
          authPage.classList.remove('hidden');
        }, 500);
      }, 1500);

      // จัดการเมื่อกดปุ่มเข้าสู่ระบบ
      loginForm.addEventListener('submit', (e) => {
        e.preventDefault(); // ป้องกันหน้าเว็บรีเฟรช
        
        // ซ่อนหน้า Login และแสดงหน้า App
        authPage.classList.add('hidden');
        appPage.classList.remove('hidden');
      });

      // จัดการเมื่อกดปุ่มออกจากระบบ
      logoutBtn.addEventListener('click', () => {
        appPage.classList.add('hidden');
        authPage.classList.remove('hidden');
        loginForm.reset(); // ล้างค่าในฟอร์ม
      });

      // จัดการเมื่อกดส่งเรื่องแจ้งซ่อม
      reportForm.addEventListener('submit', (e) => {
        e.preventDefault();
        alert('ส่งเรื่องแจ้งซ่อมสำเร็จ! ระบบได้บันทึกข้อมูลของคุณแล้ว');
        reportForm.reset();
      });
    });
  </script>
</body>
</html>
